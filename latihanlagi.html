<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Form Styling</title>
    <!-- Menghubungkan ke file CSS yang sudah kamu buat -->
    <link rel="stylesheet" href="latihanlagi.css">
</head>
<body>

    <h2>Form Login Sesuai Modul</h2>

    <form action="">

        <label for="user-email">Email:</label>
        <input type="email" id="user-email" name="email" placeholder="email@contoh.com" required>

        <label for="pass">Password:</label>
        <input type="password" id="pass" name="password" placeholder="Masukkan password" required>
        

        <button type="submit">
            Masuk
        </button>

    </form>

</body>
</html>
